<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bordados</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
<body>
    <header>
        <nav class="area-navegacao">
            <img src="images/baixados.png" alt="logo" class="logo">
            <ul>
                <li><a class="icones" href="#home"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-basket-shopping"></i></a></li>
                <li><a class="icones" href="#carrinho"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="registro.html"><i class="fa-solid fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article class="area-banner" id="home">
            <section id="banner">
                <img src="images/banner 2.png" alt="banner template" class="banner__imagem" width="1100">
            </section>
            <section id="reservas">
                  <h2 id="reservas__titulo">vagas na agenda da semana: 3 disponiveis</h2>
                  <button id="reservas__butao">reservar vaga</button>

            </section>
        </article>

        <article class="area-sobre">
            <section class="sobre">
                <h1>conheça a tia sonia</h1>
                <p>sobre ela</p>
            </section>
            <section class="foto-tia-sonia">
                <img src="images/tia-sonia.png" alt="tia sonia" class="sobre__foto">
            </section>
        </article>

        <article class="area-busca" id="bordados">
            <h2 class="catalogo-titulo"> catalogo de bordados</h2>
            <form class="busca">
               <input type="text" class="busca__campo">
               <button class="busca_butao" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
               </button>
            </form>
        </article>
        <article class="catalogo">
            <section class="bordados">
                <a href="#">
              <img src="images/bordado-01.png" alt="bordado01">
              </a>
              <h3>bordado 01</h3>
            </section>
            <section class="bordados">
                <a href="#">
              <img src="images/bordado-02.png" alt="bordado02">
              </a>
              <h3>bordado 02</h3>
            </section>
            <section class="bordados">
                <a href="#">
              <img src="images/bordado-03.png" alt="bordado03">
              </a>
              <h3>bordado 03</h3>
            </section>
            <section class="bordados">
                <a href="#">
              <img src="images/bordado-04.jpg" alt="bordado04">
              </a>
              <h3>bordado 04</h3>
            </section>
            <section class="bordados">
                <a href="#">
              <img src="images/bordado-05.jpg" alt="bordado05">
              </a>
              <h3>bordado 05</h3>
            </section>
            <section class="bordados">
                <a href="#">
              <img src="images/bordados-06.jpg" alt="bordado06">
              </a>
              <h3>bordado 06</h3>
            </section>
        </article>
    </main>
    
</body>
</html>
