<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bordados</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
<body>
    <header>
        <nav>
            <img src="images/baixados.png" alt="logo">
            <ul>
                <li><a class="icones" href="#"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-basket-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article class="area-banner">
            <section id="banner">
                <img src="images/banner 2.png" alt="banner template" class="banner__imagem">
            </section>
            <section id="reservas">
                  <h2 id="reservas__titulo">vagas na agenda da semana: 3 disponiveis</h2>
                  <button id="reservas__butao">reservar vaga</button>

            </section>
        </article>

        <article class="area-sobre">
            <section class="sobre">
                <h1>conheça a tia sonia</h1>
                <p>sobre ela</p>
            </section>
            <section class="foto tia sonia">
                <img src="images/tia-sonia.png" alt="tia sonia" class="sobre__foto">
            </section>
        </article>
    </main>
    
</body>
</html>
