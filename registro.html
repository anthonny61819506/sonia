<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <main class="area-registro">
       <section class="area-titulo">
         <h1>Registrar</h1>
       </section>
       <section class="area-formulario">
          <form action="#" class="form-cadastro">

          <div class="area-sobre">
            <div class="area-nome">
             <label for="username">Nome de usuário:</label>
             <input type="text" id="text" placeholder="nome" required>
          </div>

          <div class="area-sobrenome">
            <label for="sobrenome">Sobrenome:</label>
            <input type="text" id="sobrenome" placeholder="sobrenome" required>
          </div>
        </div>

         <div class="area-emailsenha">
          <div class="area-email">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="email" required>
          </div>
         

          <div class="area-senha">   
            <label for="password">Senha:</label>
            <input type="password" id="senha" placeholder="senha" required>
            </div>
        </div>

            <div class="area-contato">
                <div class="ddd">
                    <label for="ddd">ddd</label>
                    <input type="number" max="99" id="ddd" placeholder="ddd" required>
                </div>
            

             <div class="telefone">
                <label for="">telefone</label>
                <input type="number" max="99" id="ddd" placeholder="digite seu telefone" required>
             </div>
            </div>
             
            <div class="area-endereço">
                <div>
                    <label for="endereço">endereço</label>
                    <input type="text" id="endereço" placeholder="digite seu endereço" required>
                </div>
                
                <div class="numero">
                    <label for="numero">numero</label>
                    <input type="number" id="numero" placeholder="digite seu numero" required>  
                </div>

                <div class="cidade">
                    <label for="cidade">cidade</label>
                    <input type="text" id="cidade" placeholder="digite sua cidade" required>
                </div>
                <div class="cep">
                    <label for="cep">cep</label>
                    <input type="text" id="cep" placeholder="digite seu cep" required>
                </div>
            </div>
                <div class="area-dados">
                    <div class="nascimento">
                        <label for="data-nascimento">data de nascimento</label>
                        <input type="date" id="data-nascimento" required>
                    </div>

                    <div class="genero">
                        <label for="genero">gênero</label>
                        <select id="genero" required>
                            <option value="#" disabled selected> selecione seu gênero</option>
                            <option value="#">masculino</option>
                            <option value="#">feminino</option>
                            <option value="#">outro</option>
                        </select>
                        
                    </div>
            </div>
        </form>
    </section>
    </main>

      
    

    
    
</body>
</html>
