<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="registro.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
    
</head>
<body>
    <header>
        <nav class="area-navegacao">
            <img src="images/baixados.png" alt="logo" class="logo">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-basket-shopping"></i></a></li>
                <li><a class="icones" href="#carrinho"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>
    <main class="area-registro">
       <section class="area-titulo">
         <h1>Registrar</h1>
       </section>
       <section class="area-formulario">
          <form action="#" class="form-cadastro">

          <div class="area-nome formatacao">
            <div class="primeiro-nome titulo-campo">
             <label for="username">Nome de usuário:</label>
             <input type="text" id="text" placeholder="nome" required>
          </div>

          <div class="area-sobrenome titulo-campo">
            <label for="sobrenome">Sobrenome:</label>
            <input type="text" id="sobrenome" placeholder="sobrenome" required>
          </div>
        </div>

         <div class="area-emailsenha formatacao">
          <div class="area-email titulo-campo">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="email" required>
          </div>
         

          <div class="area-senha titulo-campo">   
            <label for="password">Senha:</label>
            <input type="password" id="senha" placeholder="senha" required>
            </div>
        </div>

            <div class="area-contato formatacao">
                <div class="ddd titulo-campo">
                    <label for="ddd">ddd</label>
                    <input type="number" max="99" id="ddd" placeholder="ddd" required>
                </div>
            

             <div class="telefone titulo-campo">
                <label for="">Telefone</label>
                <input type="number" max="99" id="ddd" placeholder="digite seu telefone" required>
             </div>
            </div>
             
            <div class="area-endereco formatacao">
                <div class="endereco-numero">
                <div class="endereco titulo-campo">
                    <label for="endereço">Endereço</label>
                    <input type="text" id="endereco" placeholder="digite seu endereço" required>
                </div>
                
                <div class="numero titulo-campo">
                    <label for="numero">Número</label>
                    <input type="number" id="numero" placeholder="digite seu numero" required>  
                </div>
                </div>
                <div class="cidade-cep formatacao">
                <div class="cidade titulo-campo">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="digite sua cidade" required>
                </div>
                <div class="cep titulo-campo">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="digite seu cep" required>
                </div>
                </div>
            </div>
                <div class="area-dados formatacao">
                    <div class="nascimento titulo-campo">
                        <label for="data-nascimento">data de nascimento</label>
                        <input type="date" id="data-nascimento" required>
                    </div>

                    <div class="genero titulo-campo">
                        <label for="genero">gênero</label>
                        <select id="genero" required>
                            <option value="#" disabled selected> selecione seu gênero</option>
                            <option value="#">masculino</option>
                            <option value="#">feminino</option>
                            <option value="#">outro</option>
                        </select>
                        
                    </div>
            </div>
            <div class="area-botao">
                    <button type="submit" id="botao-cadastrar"> cadastrar </button>
                    <a href="#" class="link-login"> Já possui uma conta? Acesse agora !</a>
                </div>
        </form>
    </section>
    </main>

      
    

    
    
</body>
</html>
