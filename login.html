<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="registro.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <header>
        <nav class="area-navegacao">
            <img src="images/baixados.png" alt="logo" class="logo">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-basket-shopping"></i></a></li>
                <li><a class="icones" href="#carrinho"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>
    <main class="area-login">
       <section class="area-titulo">
         <h1>Acesse sua conta</h1>
       </section>
       <section class="area-formulario">
          <form action="#" class="form-login">
            <div class="campos">
            <div class="nome">
             <label for="username">Nome de usuário:</label>
             <input type="text" id="text" placeholder="nome" required>
          </div>
        
          <div class="area-email">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="email" required>
          </div>
         

          <div class="area-senha">   
            <label for="password">Senha:</label>
            <input type="password" id="senha" placeholder="senha" required>
            </div>
            </div>

            <div class="area-botao">
                    <button type="submit" id="botao-logar"> Logar</button>
                    <a href="registro.html" class="link-cadastro">Não tem uma conta? Cadastre-se agora!</a>
            </div>
        </form>
                
    
</body>
</html>
